<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <title>Ming-Hung Fan | Senior Frontend Architect & Operations Specialist</title>
    <meta name="description" content="Portfolio of Ming-Hung Fan, an elite Senior Frontend Architect & Operations Specialist. Specializing in high-performance React/Angular, GenAI integrations, and network infrastructure." />
    <meta name="keywords" content="Ming-Hung Fan, Frontend Engineer, Operations Specialist, Angular 18, React 19, Google Gemini, CCNP, Cisco Routing, TypeScript, Toronto Developer" />
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- Anti-flicker background color -->
    <style>
      html, body {
        background-color: #0A0F19;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body class="bg-obsidian text-text-primary antialiased selection:bg-accent-cyan/30 selection:text-accent-cyan">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
